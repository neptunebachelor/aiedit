[project]
input = "input"
output = "output"
thumbnail_dirname = "thumbnails"
video_extensions = [".mp4", ".mov", ".m4v", ".avi"]

[sampling]
sample_fps = 2.0
forced_keep_interval_seconds = 1.5
jpeg_quality = 88
max_frames = 0

[filters]
min_blur_score = 80.0
min_frame_diff = 5.0
min_hash_distance = 5

[ollama]
enabled = true
host = "http://127.0.0.1:11434"
model = "qwen3-vl:8b"
temperature = 0.1
timeout_seconds = 120

[prompt]
preset = "default"
positive_labels = [
  "corner_entry",
  "apex",
  "corner_exit",
  "full_throttle",
  "high_speed",
  "late_braking",
  "handlebar_wobble",
  "near_barrier",
]
negative_labels = [
  "pit_lane",
  "cooldown",
  "formation_lap",
  "slow_straight",
  "low_value_track",
]
extra_positive_labels = []
extra_negative_labels = []
extra_instructions = ""
system_instructions = """
You review a single-lap racetrack riding video from a forward-facing fixed camera.
Keep only short-form highlight moments with clear racing value.
Prioritize: aggressive corner entry, visible lean angle, apex clips, corner exit drive, full-throttle acceleration, high-speed sections, late braking, handlebar wobble, and close moments near curbs, tyre walls, or barriers.
Reject: pit-lane footage, cooldown sections, flat low-value cruising, uneventful straights, and visually repetitive shots.
Return valid JSON only.
"""

[decision]
min_keep_score = 0.7
merge_gap_seconds = 3.0
padding_before_seconds = 1.0
padding_after_seconds = 1.8
min_segment_seconds = 2.0
max_reason_chars = 80

[extract]
frame_interval_seconds = 0.5
resize_for_llm = 1280

[provider]
routing = "auto"
submission_mode = "auto"
enabled = true
temperature = 0.1
timeout_seconds = 120

[provider.ollama]
enabled = true
supports_vision = true
api_base = "http://127.0.0.1:11434"
model = "qwen3-vl:8b"

[provider.gemini]
enabled = true
profile = "gemini_3_flash"
supports_vision = true
supports_async_batch = true
prefer_async_batch = false
min_request_interval_seconds = 0.0
api_base = "https://generativelanguage.googleapis.com/v1beta/openai/"
model = "gemini-3-flash-preview"
api_key = ""
api_key_env = "GEMINI_API_KEY"
image_transport = "base64"
image_url_template = ""
json_output = true

[provider.qwen]
enabled = true
profile = "qwen3_vl_flash"
supports_vision = true
api_base = "https://dashscope.aliyuncs.com/compatible-mode/v1"
model = "qwen3-vl-flash"
api_key = ""
api_key_env = "DASHSCOPE_API_KEY"
image_transport = "base64"
image_url_template = ""
json_output = false

[provider.qwen.extra_body]
enable_thinking = false

[provider.openai_compatible]
enabled = true
profile = "deepseek_v3_2"
supports_vision = false
api_base = "https://api.deepseek.com"
model = "deepseek-chat"
api_key = ""
api_key_env = "DEEPSEEK_API_KEY"
image_transport = "base64"
image_url_template = ""
json_output = true

[review]
target_seconds = 30.0
top_highlights = 1
clip_before = 0.8
clip_after = 1.8
cluster_gap = 1.5
min_clip_seconds = 2.0
max_clip_seconds = 6.0
max_clips_per_source_segment = 2
caption_mode = "human"
caption_style = "default"
caption_prefix = ""
caption_suffix = ""
caption_detail_prefix = ""

[preview]
enabled = false
resolution = "720p"
crf = 28
preset = "veryfast"

[render]
resolution = "source"
crf = 18
preset = "fast"
