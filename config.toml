[project]
input = "input"
output = "output"
thumbnail_dirname = "thumbnails"
video_extensions = [".mp4", ".mov", ".m4v", ".avi"]

[sampling]
sample_fps = 1.0
forced_keep_interval_seconds = 3.0
jpeg_quality = 88
max_frames = 0

[filters]
min_blur_score = 80.0
min_frame_diff = 6.0
min_hash_distance = 6

[ollama]
enabled = true
host = "http://127.0.0.1:11434"
model = "qwen3-vl:8b"
temperature = 0.1
timeout_seconds = 120

[prompt]
positive_labels = [
  "bend",
  "scenery",
  "traffic",
  "overtake",
  "group_ride",
  "tunnel_transition",
  "water_view",
  "mountain_view",
  "sunset",
]
negative_labels = [
  "stop",
  "waiting",
  "parking",
  "blur",
  "low_value_straight",
]
system_instructions = """
You review forward-fixed motorcycle footage exported from Insta360 Studio.
Keep only visually valuable moments for a short-form highlight edit.
Prioritize: obvious bends, strong scenery, nearby vehicles, overtakes, group riding, tunnel in/out transitions.
Reject: red lights, parking, long boring straight roads, severe blur, frames with little editorial value.
Return valid JSON only.
"""

[decision]
min_keep_score = 0.65
merge_gap_seconds = 4.0
padding_before_seconds = 1.5
padding_after_seconds = 2.5
min_segment_seconds = 2.0
max_reason_chars = 80

[extract]
frame_interval_seconds = 1.0
resize_for_llm = 1280

[provider]
routing = "auto"
submission_mode = "auto"
enabled = true
temperature = 0.1
timeout_seconds = 120

[provider.ollama]
enabled = true
supports_vision = true
api_base = "http://127.0.0.1:11434"
model = "qwen3-vl:8b"

[provider.gemini]
enabled = true
profile = "gemini_3_flash"
supports_vision = true
supports_async_batch = true
prefer_async_batch = false
min_request_interval_seconds = 0.0
api_base = "https://generativelanguage.googleapis.com/v1beta/openai/"
model = "gemini-3-flash-preview"
api_key = ""
api_key_env = "GEMINI_API_KEY"
image_transport = "base64"
image_url_template = ""
json_output = true

[provider.qwen]
enabled = true
profile = "qwen3_vl_flash"
supports_vision = true
api_base = "https://dashscope.aliyuncs.com/compatible-mode/v1"
model = "qwen3-vl-flash"
api_key = ""
api_key_env = "DASHSCOPE_API_KEY"
image_transport = "base64"
image_url_template = ""
json_output = false

[provider.qwen.extra_body]
enable_thinking = false

[provider.openai_compatible]
enabled = true
profile = "deepseek_v3_2"
supports_vision = false
api_base = "https://api.deepseek.com"
model = "deepseek-chat"
api_key = ""
api_key_env = "DEEPSEEK_API_KEY"
image_transport = "base64"
image_url_template = ""
json_output = true

[review]
target_seconds = 30.0
clip_before = 1.0
clip_after = 2.0
cluster_gap = 2.0
min_clip_seconds = 2.0
max_clip_seconds = 6.0
max_clips_per_source_segment = 2
caption_mode = "human"

[preview]
enabled = false
resolution = "720p"
crf = 28
preset = "veryfast"

[render]
resolution = "source"
crf = 18
preset = "fast"
