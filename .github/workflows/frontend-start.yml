name: Dev Env CI (Frontend + Backend)

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - "frontend/**"
      - "*.py"
      - "requirements.txt"
      - ".github/workflows/frontend-start.yml"
  push:
    paths:
      - "frontend/**"
      - "*.py"
      - "requirements.txt"
      - ".github/workflows/frontend-start.yml"

jobs:
  dev-env-check:
    runs-on: [self-hosted, windows, x64]
    timeout-minutes: 45
    defaults:
      run:
        shell: powershell
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Backend smoke check
        run: python pipeline.py --help
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci


      - name: Build frontend preview bundle
        working-directory: frontend
        run: npm run build

      - name: Upload frontend preview bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-preview-dist
          path: frontend/dist

      - name: Start frontend (Vite)
        working-directory: frontend
        run: |
          $process = Start-Process `
            -FilePath "cmd.exe" `
            -ArgumentList '/c', 'npm run dev -- --host 0.0.0.0 --port 18080 > vite.log 2>&1' `
            -WorkingDirectory (Get-Location).Path `
            -PassThru
          Set-Content -Path vite.pid -Value $process.Id

      - name: Wait for frontend to boot
        working-directory: frontend
        run: |
          for ($i = 0; $i -lt 30; $i++) {
            try {
              Invoke-WebRequest -Uri "http://127.0.0.1:18080" -TimeoutSec 5 | Out-Null
              Write-Host "Frontend is up"
              exit 0
            } catch {
              Start-Sleep -Seconds 2
            }
          }
          Write-Host "Frontend failed to start"
          if (Test-Path vite.log) {
            Write-Host "--- vite.log ---"
            Get-Content vite.log
          }
          exit 1

      - name: Keep preview alive for manual check (PR only)
        if: github.event_name == 'pull_request'
        run: |
          Write-Host "Frontend preview is running on the NEP runner at port 18080."
          Write-Host "Keeping it alive for 30 minutes so reviewers can verify PR behavior."
          Start-Sleep -Seconds 1800

      - name: Upload frontend log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vite-log
          path: frontend/vite.log

      - name: Stop frontend
        if: always()
        working-directory: frontend
        run: |
          if (Test-Path vite.pid) {
            $vitePid = (Get-Content vite.pid | Select-Object -First 1).Trim()
            if ($vitePid) {
              & taskkill /PID $vitePid /T /F 2>$null | Out-Null
            }
          }
