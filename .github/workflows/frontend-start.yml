name: Dev Env CI (Frontend + Backend)

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - "frontend/**"
      - "*.py"
      - "requirements.txt"
      - ".github/workflows/frontend-start.yml"
  push:
    paths:
      - "frontend/**"
      - "*.py"
      - "requirements.txt"
      - ".github/workflows/frontend-start.yml"

jobs:
  dev-env-check:
    runs-on: [self-hosted, windows, x64]
    timeout-minutes: 45
    env:
      NPM_CONFIG_CACHE: ${{ github.workspace }}\.npm-cache
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Backend smoke check
        run: python pipeline.py --help

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        shell: powershell
        working-directory: frontend
        run: npm.cmd ci

      - name: Build frontend preview bundle
        shell: powershell
        working-directory: frontend
        run: npm.cmd run build

      - name: Upload frontend preview bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-preview-dist
          path: frontend/dist

      - name: Start frontend (Vite)
        shell: powershell
        working-directory: frontend
        run: |
          $ErrorActionPreference = "Stop"
          $frontendDir = (Get-Location).Path
          $logPath = Join-Path $frontendDir "vite.log"
          $errorLogPath = Join-Path $frontendDir "vite.err.log"
          $npmPath = (Get-Command npm.cmd).Source
          $powershellPath = (Get-Command powershell.exe).Source

          $frontendCommand = @"
          Set-Location '$frontendDir'
          & '$npmPath' 'run' 'dev' '--' '--host' '0.0.0.0' '--port' '18080' 1>> '$logPath' 2>> '$errorLogPath'
          "@

          $encodedCommand = [Convert]::ToBase64String([Text.Encoding]::Unicode.GetBytes($frontendCommand))
          $startInfo = New-Object System.Diagnostics.ProcessStartInfo
          $startInfo.FileName = $powershellPath
          $startInfo.Arguments = "-NoProfile -EncodedCommand $encodedCommand"
          $startInfo.WorkingDirectory = $frontendDir
          $startInfo.UseShellExecute = $false
          $startInfo.CreateNoWindow = $true

          $process = [System.Diagnostics.Process]::Start($startInfo)
          if ($null -eq $process) {
            throw "Failed to start Vite dev server."
          }

          $process.Id | Set-Content -Path (Join-Path $frontendDir "vite.pid") -Encoding ascii

      - name: Wait for frontend to boot
        shell: powershell
        working-directory: frontend
        run: |
          $ErrorActionPreference = "Stop"
          $frontendUrl = "http://127.0.0.1:18080"
          $isReady = $false

          for ($attempt = 1; $attempt -le 30; $attempt++) {
            try {
              $response = Invoke-WebRequest -Uri $frontendUrl -TimeoutSec 5
              if ($response.StatusCode -eq 200) {
                Write-Host "Frontend is up"
                $isReady = $true
                break
              }
            } catch {
              Start-Sleep -Seconds 2
            }
          }

          if (-not $isReady) {
            Write-Host "Frontend failed to start"
            if (Test-Path vite.log) {
              Write-Host "--- vite.log ---"
              Get-Content vite.log
            }
            if (Test-Path vite.err.log) {
              Write-Host "--- vite.err.log ---"
              Get-Content vite.err.log
            }
            exit 1
          }

      - name: Keep preview alive for manual check (PR only)
        if: github.event_name == 'pull_request'
        shell: powershell
        run: |
          Write-Host "Frontend preview is running on the NEP runner at port 18080."
          Write-Host "Keeping it alive for 30 minutes so reviewers can verify PR behavior."
          Start-Sleep -Seconds 1800

      - name: Upload frontend log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vite-log
          path: |
            frontend/vite.log
            frontend/vite.err.log

      - name: Stop frontend
        if: always()
        shell: powershell
        working-directory: frontend
        run: |
          if (-not (Test-Path vite.pid)) {
            exit 0
          }

          $processId = Get-Content vite.pid | Select-Object -First 1
          if ([string]::IsNullOrWhiteSpace($processId)) {
            exit 0
          }

          taskkill.exe /PID ([int]$processId) /T /F *> $null
          if ($LASTEXITCODE -ne 0) {
            Write-Host "Vite process $processId was already stopped."
          }
