name: Frontend Start on NEP Runner

on:
  workflow_dispatch:
  push:
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-start.yml"

jobs:
  start-frontend:
    runs-on:
      group: NEP
      labels: self-hosted
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Start frontend (Vite)
        run: |
          nohup npm run dev -- --host 0.0.0.0 --port 18080 > vite.log 2>&1 &
          echo $! > vite.pid

      - name: Wait for frontend to boot
        run: |
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:18080 > /dev/null; then
              echo "Frontend is up"
              exit 0
            fi
            sleep 2
          done
          echo "Frontend failed to start"
          echo "--- vite.log ---"
          cat vite.log || true
          exit 1

      - name: Upload Vite log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vite-log
          path: frontend/vite.log

      - name: Stop frontend
        if: always()
        run: |
          if [ -f vite.pid ]; then
            kill "$(cat vite.pid)" || true
          fi
