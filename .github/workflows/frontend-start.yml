name: Dev Env CI (Frontend + Backend)

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - "frontend/**"
      - "*.py"
      - "requirements.txt"
      - ".github/workflows/frontend-start.yml"
  push:
    paths:
      - "frontend/**"
      - "*.py"
      - "requirements.txt"
      - ".github/workflows/frontend-start.yml"

jobs:
  dev-env-check:
    runs-on: [self-hosted, windows, x64]
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Backend smoke check
        run: python pipeline.py --help
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci


      - name: Build frontend preview bundle
        working-directory: frontend
        run: npm run build

      - name: Upload frontend preview bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-preview-dist
          path: frontend/dist

      - name: Start frontend (Vite)
        working-directory: frontend
        run: |
          nohup npm run dev -- --host 0.0.0.0 --port 18080 > vite.log 2>&1 &
          echo $! > vite.pid

      - name: Wait for frontend to boot
        working-directory: frontend
        run: |
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:18080 > /dev/null; then
              echo "Frontend is up"
              exit 0
            fi
            sleep 2
          done
          echo "Frontend failed to start"
          echo "--- vite.log ---"
          cat vite.log || true
          exit 1

      - name: Keep preview alive for manual check (PR only)
        if: github.event_name == 'pull_request'
        run: |
          echo "Frontend preview is running on the NEP runner at port 18080."
          echo "Keeping it alive for 30 minutes so reviewers can verify PR behavior."
          sleep 1800

      - name: Upload frontend log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vite-log
          path: frontend/vite.log

      - name: Stop frontend
        if: always()
        working-directory: frontend
        run: |
          if [ -f vite.pid ]; then
            kill "$(cat vite.pid)" || true
          fi
